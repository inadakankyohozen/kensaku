<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>浄化槽管理士研修会 受付チェックイン</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  --blue:   #1a5276;
  --blue2:  #2e86c1;
  --green:  #1e8449;
  --green2: #27ae60;
  --red:    #c0392b;
  --orange: #e67e22;
  --gray:   #7f8c8d;
  --light:  #f4f6f7;
  --white:  #ffffff;
  --border: #dce1e7;
  --shadow: rgba(0,0,0,0.1);
}

body {
  font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
  background: var(--light);
  color: #2c3e50;
  min-height: 100vh;
}

/* ヘッダー */
.header {
  background: var(--blue);
  color: var(--white);
  padding: 0;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 8px var(--shadow);
}
.header-inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
}
.header h1 { font-size: 15px; font-weight: 700; letter-spacing: 0.03em; }
.header-sub { font-size: 11px; opacity: 0.8; margin-top: 2px; }
.btn-settings {
  background: rgba(255,255,255,0.15);
  border: 1px solid rgba(255,255,255,0.3);
  color: #fff;
  padding: 6px 12px;
  border-radius: 6px;
  font-size: 12px;
  cursor: pointer;
  white-space: nowrap;
}

/* 開催日選択バー */
.event-bar {
  background: var(--blue2);
  padding: 10px 16px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.event-bar label { color: #fff; font-size: 12px; white-space: nowrap; }
.event-select {
  flex: 1;
  padding: 8px 12px;
  border: none;
  border-radius: 6px;
  font-size: 14px;
  font-weight: 600;
  background: #fff;
  color: var(--blue);
}
.btn-reload {
  background: rgba(255,255,255,0.2);
  border: 1px solid rgba(255,255,255,0.4);
  color: #fff;
  padding: 8px 12px;
  border-radius: 6px;
  font-size: 12px;
  cursor: pointer;
  white-space: nowrap;
}

/* メインコンテンツ */
.main { max-width: 640px; margin: 0 auto; padding: 12px 12px 80px; }

/* 統計カード */
.stats-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-bottom: 12px;
}
.stat-card {
  background: var(--white);
  border-radius: 10px;
  padding: 12px 8px;
  text-align: center;
  box-shadow: 0 1px 4px var(--shadow);
  cursor: pointer;
  transition: transform 0.1s;
}
.stat-card:active { transform: scale(0.97); }
.stat-num {
  font-size: 32px;
  font-weight: 800;
  line-height: 1;
  margin-bottom: 4px;
}
.stat-label { font-size: 11px; color: var(--gray); }
.stat-card.checkedin .stat-num { color: var(--green); }
.stat-card.pending   .stat-num { color: var(--blue2); }
.stat-card.noshow    .stat-num { color: var(--orange); }

/* カメラエリア */
.camera-section {
  background: var(--white);
  border-radius: 12px;
  padding: 14px;
  margin-bottom: 12px;
  box-shadow: 0 1px 4px var(--shadow);
}
.section-title {
  font-size: 13px;
  font-weight: 700;
  color: var(--blue);
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.camera-wrap {
  position: relative;
  width: 100%;
  aspect-ratio: 1;
  max-height: 280px;
  background: #000;
  border-radius: 10px;
  overflow: hidden;
  display: none;
}
.camera-wrap.active { display: block; }
#video {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.scan-frame {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 55%; height: 55%;
}
.scan-frame::before, .scan-frame::after,
.scan-frame span::before, .scan-frame span::after {
  content: '';
  position: absolute;
  width: 22px; height: 22px;
  border-color: #fff;
  border-style: solid;
}
.scan-frame::before      { top: 0;    left: 0;   border-width: 3px 0 0 3px; }
.scan-frame::after       { top: 0;    right: 0;  border-width: 3px 3px 0 0; }
.scan-frame span::before { bottom: 0; left: 0;   border-width: 0 0 3px 3px; }
.scan-frame span::after  { bottom: 0; right: 0;  border-width: 0 3px 3px 0; }
.scan-line {
  position: absolute;
  left: 5%; right: 5%;
  height: 2px;
  background: rgba(46, 134, 193, 0.8);
  animation: scanMove 2s linear infinite;
  top: 10%;
}
@keyframes scanMove {
  0%   { top: 10%; }
  100% { top: 90%; }
}
#canvas { display: none; }

.btn-camera {
  width: 100%;
  padding: 13px;
  background: var(--blue);
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  margin-top: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition: background 0.2s;
}
.btn-camera:active { background: #154360; }
.btn-camera.stop   { background: var(--gray); }

/* 手動検索 */
.search-section {
  background: var(--white);
  border-radius: 12px;
  padding: 14px;
  margin-bottom: 12px;
  box-shadow: 0 1px 4px var(--shadow);
}
.search-row { display: flex; gap: 8px; }
.search-input {
  flex: 1;
  padding: 11px 14px;
  border: 1.5px solid var(--border);
  border-radius: 8px;
  font-size: 14px;
}
.search-input:focus { outline: none; border-color: var(--blue2); }
.btn-search {
  padding: 11px 16px;
  background: var(--blue);
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  white-space: nowrap;
}

/* チェックイン結果モーダル */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 200;
  align-items: flex-end;
  justify-content: center;
  padding: 16px;
}
.modal-overlay.show { display: flex; }
.modal {
  background: var(--white);
  border-radius: 16px;
  width: 100%;
  max-width: 480px;
  overflow: hidden;
  animation: slideUp 0.25s ease;
}
@keyframes slideUp {
  from { transform: translateY(40px); opacity: 0; }
  to   { transform: translateY(0);    opacity: 1; }
}
.modal-header {
  padding: 16px 20px 12px;
  text-align: center;
}
.modal-body { padding: 0 20px 20px; }

.result-company { font-size: 13px; color: var(--gray); margin-bottom: 4px; text-align: center; }
.result-name {
  font-size: 30px;
  font-weight: 800;
  text-align: center;
  letter-spacing: 0.05em;
  margin-bottom: 16px;
  color: #2c3e50;
}
.result-suffix { font-size: 16px; font-weight: 400; }

.info-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 16px;
}
.info-item {
  background: var(--light);
  border-radius: 8px;
  padding: 10px 12px;
}
.info-item label { display: block; font-size: 10px; color: var(--gray); margin-bottom: 3px; }
.info-item span  { font-size: 15px; font-weight: 700; color: #2c3e50; }

.kubun-tag {
  display: inline-block;
  padding: 3px 12px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 700;
  background: #d6eaf8;
  color: var(--blue);
}

.status-banner {
  padding: 14px;
  border-radius: 10px;
  text-align: center;
  font-size: 16px;
  font-weight: 700;
  margin-bottom: 14px;
}
.status-banner.success { background: #eafaf1; color: var(--green); }
.status-banner.warning { background: #fef9e7; color: var(--orange); }
.status-banner.error   { background: #fdedec; color: var(--red); }

.btn-checkin-ok {
  width: 100%;
  padding: 16px;
  background: var(--green2);
  color: #fff;
  border: none;
  border-radius: 10px;
  font-size: 18px;
  font-weight: 800;
  cursor: pointer;
  margin-bottom: 8px;
  transition: background 0.2s;
}
.btn-checkin-ok:active { background: #1d8348; }
.btn-close {
  width: 100%;
  padding: 12px;
  background: var(--light);
  color: var(--gray);
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: 14px;
  cursor: pointer;
}

/* 未受付一覧 */
.list-section {
  background: var(--white);
  border-radius: 12px;
  padding: 14px;
  margin-bottom: 12px;
  box-shadow: 0 1px 4px var(--shadow);
}
.list-toggle {
  display: flex;
  align-items: center;
  justify-content: space-between;
  cursor: pointer;
  user-select: none;
}
.list-toggle-arrow { font-size: 12px; color: var(--gray); transition: transform 0.2s; }
.list-toggle-arrow.open { transform: rotate(180deg); }
.list-body { display: none; margin-top: 10px; }
.list-body.show { display: block; }

.person-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 8px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background 0.15s;
  border-radius: 6px;
}
.person-item:last-child { border-bottom: none; }
.person-item:active { background: var(--light); }
.person-name { font-size: 14px; font-weight: 700; }
.person-company { font-size: 11px; color: var(--gray); }
.person-seat {
  font-size: 11px;
  background: var(--light);
  padding: 3px 8px;
  border-radius: 4px;
  color: var(--gray);
  white-space: nowrap;
}

/* 直近受付履歴 */
.history-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 8px;
  border-bottom: 1px solid var(--border);
  border-radius: 6px;
}
.history-item:last-child { border-bottom: none; }
.history-name { font-size: 14px; font-weight: 700; }
.history-company { font-size: 11px; color: var(--gray); }
.history-time {
  font-size: 12px;
  font-weight: 700;
  color: var(--green);
  white-space: nowrap;
}

/* ローディング */
.loading { text-align: center; padding: 20px; color: var(--gray); font-size: 13px; }

/* 設定モーダル */
.settings-modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 300;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.settings-modal.show { display: flex; }
.settings-box {
  background: #fff;
  border-radius: 14px;
  padding: 22px;
  width: 100%;
  max-width: 400px;
}
.settings-box h3 { font-size: 16px; margin-bottom: 16px; color: var(--blue); }
.settings-box label { display: block; font-size: 12px; color: var(--gray); margin-bottom: 4px; margin-top: 10px; }
.settings-box input {
  width: 100%;
  padding: 10px 12px;
  border: 1.5px solid var(--border);
  border-radius: 8px;
  font-size: 13px;
}
.settings-btns { display: flex; gap: 8px; margin-top: 16px; }
.btn-save   { flex: 1; padding: 12px; background: var(--blue); color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 700; cursor: pointer; }
.btn-cancel-s { flex: 1; padding: 12px; background: var(--light); color: var(--gray); border: 1px solid var(--border); border-radius: 8px; font-size: 14px; cursor: pointer; }

.empty { text-align: center; padding: 16px; color: var(--gray); font-size: 13px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div>
      <h1>📋 受付チェックイン</h1>
      <div class="header-sub">浄化槽管理士研修会</div>
    </div>
    <button class="btn-settings" onclick="openSettings()">⚙️ 設定</button>
  </div>
  <!-- 開催日選択 -->
  <div class="event-bar">
    <label>開催日</label>
    <select class="event-select" id="event-select" onchange="onDateChange()">
      <option value="">--- 読み込み中 ---</option>
    </select>
    <button class="btn-reload" onclick="loadAll()">🔄</button>
  </div>
</div>

<div class="main">

  <!-- 統計 -->
  <div class="stats-row">
    <div class="stat-card checkedin" onclick="scrollToHistory()">
      <div class="stat-num" id="cnt-checkedin">0</div>
      <div class="stat-label">出席済み</div>
    </div>
    <div class="stat-card pending">
      <div class="stat-num" id="cnt-pending">0</div>
      <div class="stat-label">参加予定</div>
    </div>
    <div class="stat-card noshow" onclick="toggleNoshowList()">
      <div class="stat-num" id="cnt-noshow">0</div>
      <div class="stat-label">未受付</div>
    </div>
  </div>

  <!-- カメラスキャン -->
  <div class="camera-section">
    <div class="section-title">📷 QRコードスキャン</div>
    <div class="camera-wrap" id="camera-wrap">
      <video id="video" autoplay playsinline muted></video>
      <div class="scan-frame"><span></span></div>
      <div class="scan-line"></div>
      <canvas id="canvas"></canvas>
    </div>
    <button class="btn-camera" id="btn-camera" onclick="toggleCamera()">
      <span>📷</span> カメラを起動してスキャン
    </button>
  </div>

  <!-- 手動検索 -->
  <div class="search-section">
    <div class="section-title">🔍 手動検索</div>
    <div class="search-row">
      <input type="text" class="search-input" id="search-input"
        placeholder="氏名・管理士番号・採水員ID"
        onkeydown="if(event.key==='Enter') doSearch()">
      <button class="btn-search" onclick="doSearch()">検索</button>
    </div>
  </div>

  <!-- 未受付一覧 -->
  <div class="list-section" id="noshow-section">
    <div class="list-toggle" onclick="toggleNoshowList()">
      <div class="section-title" style="margin:0">
        🔶 未受付者一覧
        <span id="noshow-badge" style="background:#e67e22;color:#fff;padding:2px 8px;border-radius:10px;font-size:11px">0名</span>
      </div>
      <div class="list-toggle-arrow" id="noshow-arrow">▼</div>
    </div>
    <div class="list-body" id="noshow-list">
      <div class="empty">開催日を選択してください</div>
    </div>
  </div>

  <!-- 直近チェックイン履歴 -->
  <div class="list-section" id="history-section">
    <div class="section-title">✅ 直近の受付</div>
    <div id="history-list">
      <div class="empty">まだ受付はありません</div>
    </div>
  </div>

</div>

<!-- チェックイン結果モーダル -->
<div class="modal-overlay" id="checkin-modal">
  <div class="modal">
    <div class="modal-header" id="modal-header"></div>
    <div class="modal-body"  id="modal-body"></div>
  </div>
</div>

<!-- 設定モーダル -->
<div class="settings-modal" id="settings-modal">
  <div class="settings-box">
    <h3>⚙️ 設定</h3>
    <label>GAS WebアプリURL</label>
    <input type="text" id="s-gas-url" placeholder="https://script.google.com/macros/s/...">
    <div class="settings-btns">
      <button class="btn-cancel-s" onclick="closeSettings()">キャンセル</button>
      <button class="btn-save" onclick="saveSettings()">保存</button>
    </div>
  </div>
</div>

<script>
// ============================================================
// 設定
// ============================================================
let GAS_URL      = localStorage.getItem('josou_gas_url') || '';
let currentDate  = '';
let cameraStream = null;
let scanTimer    = null;
let scanning     = false;
let currentPerson = null;
let recentHistory = [];

// ============================================================
// 初期化
// ============================================================
window.onload = () => {
  if (!GAS_URL) { openSettings(); return; }
  loadDateList();
};

// ============================================================
// 設定
// ============================================================
function openSettings() {
  document.getElementById('s-gas-url').value = GAS_URL;
  document.getElementById('settings-modal').classList.add('show');
}
function closeSettings() {
  document.getElementById('settings-modal').classList.remove('show');
}
function saveSettings() {
  GAS_URL = document.getElementById('s-gas-url').value.trim();
  localStorage.setItem('josou_gas_url', GAS_URL);
  closeSettings();
  loadDateList();
}

// ============================================================
// 開催日一覧を読み込む
// ============================================================
function loadDateList() {
  callApi({ action: 'getDateList' }, data => {
    const sel = document.getElementById('event-select');
    if (data.status !== 'ok' || !data.dates || data.dates.length === 0) {
      sel.innerHTML = '<option value="">--- 開催日がありません ---</option>';
      return;
    }
    sel.innerHTML = data.dates.map(d =>
      '<option value="' + d + '">' + d + '</option>'
    ).join('');
    currentDate = data.dates[0];
    loadAll();
  });
}

function onDateChange() {
  currentDate = document.getElementById('event-select').value;
  loadAll();
}

// ============================================================
// 全データ読み込み
// ============================================================
function loadAll() {
  if (!currentDate) return;
  loadStats();
  loadNoshowList();
}

// ============================================================
// 統計読み込み
// ============================================================
function loadStats() {
  callApi({ action: 'checkinStats', openDate: currentDate }, data => {
    if (data.status !== 'ok') return;
    document.getElementById('cnt-checkedin').textContent = data.checkedIn || 0;
    document.getElementById('cnt-pending').textContent   = data.total     || 0;
    document.getElementById('cnt-noshow').textContent    = data.noshow    || 0;
    document.getElementById('noshow-badge').textContent  = (data.noshow || 0) + '名';
  });
}

// ============================================================
// 未受付一覧
// ============================================================
function loadNoshowList() {
  const el = document.getElementById('noshow-list');
  el.innerHTML = '<div class="loading">読み込み中...</div>';

  callApi({ action: 'getNoshowList', openDate: currentDate }, data => {
    if (data.status !== 'ok' || !data.list || data.list.length === 0) {
      el.innerHTML = '<div class="empty">未受付者はいません ✅</div>';
      return;
    }
    el.innerHTML = data.list.map(p =>
      '<div class="person-item" onclick="searchByKanNo(\'' + p.kanNo + '\')">' +
        '<div>' +
          '<div class="person-name">' + p.name + ' <span style="font-size:11px;color:#aaa">様</span></div>' +
          '<div class="person-company">' + p.company + '</div>' +
        '</div>' +
        '<div class="person-seat">座席 ' + (p.seatNo || '―') + '</div>' +
      '</div>'
    ).join('');
  });
}

function toggleNoshowList() {
  const body  = document.getElementById('noshow-list');
  const arrow = document.getElementById('noshow-arrow');
  const isOpen = body.classList.toggle('show');
  arrow.classList.toggle('open', isOpen);
}

function scrollToHistory() {
  document.getElementById('history-section').scrollIntoView({ behavior: 'smooth' });
}

// ============================================================
// カメラ
// ============================================================
async function toggleCamera() {
  if (cameraStream) {
    stopCamera();
  } else {
    await startCamera();
  }
}

async function startCamera() {
  try {
    cameraStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 1280 } }
    });
    const video = document.getElementById('video');
    video.srcObject = cameraStream;
    document.getElementById('camera-wrap').classList.add('active');
    const btn = document.getElementById('btn-camera');
    btn.innerHTML = '<span>⏹</span> カメラを停止';
    btn.classList.add('stop');
    video.addEventListener('loadedmetadata', () => {
      scanning = true;
      scanTimer = setInterval(scanQR, 250);
    });
  } catch(e) {
    alert('カメラを起動できませんでした。\nブラウザの設定でカメラのアクセスを許可してください。');
  }
}

function stopCamera() {
  scanning = false;
  if (scanTimer)    { clearInterval(scanTimer); scanTimer = null; }
  if (cameraStream) { cameraStream.getTracks().forEach(t => t.stop()); cameraStream = null; }
  document.getElementById('camera-wrap').classList.remove('active');
  const btn = document.getElementById('btn-camera');
  btn.innerHTML = '<span>📷</span> カメラを起動してスキャン';
  btn.classList.remove('stop');
}

function scanQR() {
  if (!scanning) return;
  const video  = document.getElementById('video');
  const canvas = document.getElementById('canvas');
  if (video.readyState !== video.HAVE_ENOUGH_DATA) return;
  canvas.width  = video.videoWidth;
  canvas.height = video.videoHeight;
  canvas.getContext('2d').drawImage(video, 0, 0);
  const img  = canvas.getContext('2d').getImageData(0, 0, canvas.width, canvas.height);
  const code = jsQR(img.data, img.width, img.height, { inversionAttempts: 'dontInvert' });
  if (code) {
    scanning = false;
    stopCamera();
    processQR(code.data);
  }
}

// ============================================================
// QR処理
// ============================================================
function processQR(data) {
  try {
    const parsed = JSON.parse(decodeURIComponent(data));
    findAndShowPerson(parsed.id || parsed.kanNo || parsed.name || '');
  } catch(e) {
    findAndShowPerson(data.trim());
  }
}

// ============================================================
// 手動検索
// ============================================================
function doSearch() {
  const q = document.getElementById('search-input').value.trim();
  if (!q) return;
  findAndShowPerson(q);
  document.getElementById('search-input').value = '';
}

function searchByKanNo(kanNo) {
  findAndShowPerson(kanNo);
}

// ============================================================
// 受講者検索→モーダル表示
// ============================================================
function findAndShowPerson(keyword) {
  if (!currentDate) { alert('開催日を選択してください'); return; }
  showModal('<div class="loading">検索中...</div>', '');

  callApi({ action: 'checkinSearch', q: keyword, openDate: currentDate }, data => {
    if (data.status !== 'ok' || !data.person) {
      showModal(
        '',
        '<div class="status-banner error">❌ 受講者が見つかりません</div>' +
        '<p style="text-align:center;color:#999;font-size:13px;margin-bottom:16px">「' + keyword + '」は今回の受講者名簿にいません</p>' +
        '<button class="btn-close" onclick="closeModal()">閉じる</button>'
      );
      return;
    }

    const p = data.person;
    currentPerson = p;

    const infoHtml =
      '<div class="result-company">' + p.company + '</div>' +
      '<div class="result-name">' + p.name + ' <span class="result-suffix">様</span></div>' +
      '<div class="info-grid">' +
        '<div class="info-item"><label>採水員ID</label><span>' + (p.newId || '―') + '</span></div>' +
        '<div class="info-item"><label>座席番号</label><span>' + (p.seatNo || '―') + '</span></div>' +
        '<div class="info-item"><label>管理士番号</label><span>' + p.kanNo + '</span></div>' +
        '<div class="info-item"><label>区分</label><span class="kubun-tag">' + p.kubun + '</span></div>' +
      '</div>';

    if (p.checkedIn) {
      showModal(
        infoHtml,
        '<div class="status-banner warning">⚠️ チェックイン済みです</div>' +
        '<p style="text-align:center;color:#e67e22;font-size:12px;margin-bottom:12px">' + (p.checkinTime || '') + ' に受付済み</p>' +
        '<button class="btn-close" onclick="closeModal()">閉じる</button>'
      );
    } else {
      showModal(
        infoHtml,
        '<button class="btn-checkin-ok" onclick="execCheckin()">✅ チェックイン</button>' +
        '<button class="btn-close" onclick="closeModal()">キャンセル</button>'
      );
    }
  });
}

// ============================================================
// チェックイン実行
// ============================================================
function execCheckin() {
  if (!currentPerson) return;
  document.getElementById('modal-body').innerHTML = '<div class="loading">記録中...</div>';

  callApi({ action: 'checkin', kanNo: currentPerson.kanNo, openDate: currentDate }, data => {
    if (data.status === 'ok') {
      const p = currentPerson;
      document.getElementById('modal-body').innerHTML =
        '<div class="status-banner success">✅ 受付完了！</div>' +
        '<div class="result-name" style="text-align:center">' + p.name + ' 様</div>' +
        '<p style="text-align:center;color:#888;font-size:13px;margin:8px 0 16px">座席番号: ' + (p.seatNo || '―') + '</p>' +
        '<button class="btn-close" onclick="closeModal()">閉じる</button>';

      // 履歴に追加
      const now = new Date().toLocaleTimeString('ja-JP', {hour:'2-digit', minute:'2-digit'});
      recentHistory.unshift({ name: p.name, company: p.company, seatNo: p.seatNo, time: now });
      renderHistory();

      // 統計更新
      const ci = document.getElementById('cnt-checkedin');
      const ns = document.getElementById('cnt-noshow');
      ci.textContent = parseInt(ci.textContent) + 1;
      ns.textContent = Math.max(0, parseInt(ns.textContent) - 1);
      document.getElementById('noshow-badge').textContent = ns.textContent + '名';

      // 未受付リストから削除
      loadNoshowList();

      // 3秒後に自動で閉じる
      setTimeout(closeModal, 3000);
    } else {
      document.getElementById('modal-body').innerHTML =
        '<div class="status-banner error">❌ エラーが発生しました</div>' +
        '<p style="text-align:center;color:#999;font-size:13px;margin-bottom:12px">' + (data.message || '') + '</p>' +
        '<button class="btn-close" onclick="closeModal()">閉じる</button>';
    }
    currentPerson = null;
  });
}

// ============================================================
// モーダル制御
// ============================================================
function showModal(headerHtml, bodyHtml) {
  document.getElementById('modal-header').innerHTML = headerHtml;
  document.getElementById('modal-body').innerHTML   = bodyHtml;
  document.getElementById('checkin-modal').classList.add('show');
}
function closeModal() {
  document.getElementById('checkin-modal').classList.remove('show');
  currentPerson = null;
}

// ============================================================
// 履歴表示
// ============================================================
function renderHistory() {
  const el = document.getElementById('history-list');
  if (recentHistory.length === 0) {
    el.innerHTML = '<div class="empty">まだ受付はありません</div>';
    return;
  }
  el.innerHTML = recentHistory.slice(0, 15).map(h =>
    '<div class="history-item">' +
      '<div>' +
        '<div class="history-name">' + h.name + ' 様</div>' +
        '<div class="history-company">' + h.company + (h.seatNo ? '　座席: ' + h.seatNo : '') + '</div>' +
      '</div>' +
      '<div class="history-time">' + h.time + '</div>' +
    '</div>'
  ).join('');
}

// ============================================================
// JSONP API呼び出し
// ============================================================
let _cbN = 0;
function callApi(params, cb) {
  if (!GAS_URL) { cb({ status: 'error', message: 'GAS URLが未設定です' }); return; }
  const name = '_jcb' + (++_cbN);
  const qs   = Object.entries(params).map(([k,v]) => k + '=' + encodeURIComponent(v)).join('&');
  const url  = GAS_URL + '?' + qs + '&callback=' + name;
  window[name] = d => { delete window[name]; document.head.removeChild(s); cb(d); };
  const s = document.createElement('script');
  s.src = url;
  s.onerror = () => { delete window[name]; cb({ status: 'error', message: '通信エラー' }); };
  document.head.appendChild(s);
}
</script>
