<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>浄化槽管理士研修会 管理システム</title>
<style>
  :root {
    --ink: #1a1a2e;
    --paper: #f8f6f0;
    --accent: #2c5f8a;
    --accent2: #4a9b7f;
    --warn: #c0392b;
    --caution: #e67e22;
    --border: #d4c9b0;
    --shadow: rgba(44,95,138,0.12);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Serif JP', 'YuMincho', 'Yu Mincho', serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
  }

  /* ヘッダー */
  header {
    background: var(--accent);
    color: #fff;
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: 0 2px 8px var(--shadow);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  header h1 {
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 0.05em;
  }

  header span {
    font-size: 11px;
    opacity: 0.8;
  }

  /* メインレイアウト */
  .container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 24px 16px;
  }

  /* 検索ボックス */
  .search-box {
    background: #fff;
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 20px 24px;
    margin-bottom: 24px;
    box-shadow: 0 2px 12px var(--shadow);
  }

  .search-box h2 {
    font-size: 14px;
    color: var(--accent);
    margin-bottom: 14px;
    letter-spacing: 0.05em;
  }

  .search-row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .search-input {
    flex: 1;
    min-width: 200px;
    padding: 10px 16px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-size: 15px;
    font-family: inherit;
    background: var(--paper);
    outline: none;
    transition: border-color 0.2s;
  }

  .search-input:focus {
    border-color: var(--accent);
  }

  .btn {
    padding: 10px 20px;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .btn-primary {
    background: var(--accent);
    color: #fff;
  }

  .btn-primary:hover { background: #1e4a6e; }

  .btn-secondary {
    background: var(--accent2);
    color: #fff;
  }

  .btn-secondary:hover { background: #3a7a65; }

  .btn-warn {
    background: var(--caution);
    color: #fff;
  }

  .search-hint {
    margin-top: 10px;
    font-size: 12px;
    color: #888;
  }

  /* タブ */
  .tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 16px;
    border-bottom: 2px solid var(--border);
  }

  .tab {
    padding: 8px 18px;
    border: none;
    background: none;
    font-size: 13px;
    font-family: inherit;
    cursor: pointer;
    color: #888;
    border-bottom: 2px solid transparent;
    margin-bottom: -2px;
    transition: all 0.2s;
  }

  .tab.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
    font-weight: 600;
  }

  /* 検索結果 */
  .results-header {
    font-size: 13px;
    color: #666;
    margin-bottom: 12px;
    padding: 0 4px;
  }

  .results-header strong {
    color: var(--accent);
    font-size: 16px;
  }

  /* カード */
  .card {
    background: #fff;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 16px 20px;
    margin-bottom: 10px;
    cursor: pointer;
    transition: all 0.2s;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 8px;
    box-shadow: 0 1px 4px var(--shadow);
  }

  .card:hover {
    border-color: var(--accent);
    box-shadow: 0 4px 16px var(--shadow);
    transform: translateY(-1px);
  }

  .card-name {
    font-size: 17px;
    font-weight: 600;
    letter-spacing: 0.05em;
  }

  .card-kana {
    font-size: 11px;
    color: #999;
    margin-bottom: 4px;
  }

  .card-info {
    font-size: 12px;
    color: #666;
    line-height: 1.7;
  }

  .card-right {
    text-align: right;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 6px;
  }

  /* バッジ */
  .badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
  }

  .badge-valid   { background: #e8f5e9; color: #2e7d32; }
  .badge-warning { background: #fff3e0; color: #e65100; }
  .badge-caution { background: #fffde7; color: #f57f17; }
  .badge-expired { background: #ffebee; color: #c62828; }
  .badge-id      { background: #e3f2fd; color: #1565c0; font-size: 13px; }

  /* 詳細パネル */
  .detail-panel {
    display: none;
    background: #fff;
    border: 1.5px solid var(--accent);
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 20px;
    box-shadow: 0 4px 20px var(--shadow);
  }

  .detail-panel.show { display: block; }

  .detail-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 20px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }

  .detail-name {
    font-size: 24px;
    font-weight: 700;
    letter-spacing: 0.05em;
  }

  .detail-kana {
    font-size: 12px;
    color: #999;
    margin-top: 2px;
  }

  .detail-section {
    margin-bottom: 20px;
  }

  .detail-section h3 {
    font-size: 12px;
    color: var(--accent);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 10px;
    padding-bottom: 4px;
    border-bottom: 1px solid var(--border);
  }

  .detail-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 10px;
  }

  .detail-item label {
    display: block;
    font-size: 11px;
    color: #999;
    margin-bottom: 2px;
  }

  .detail-item span {
    font-size: 14px;
    font-weight: 500;
  }

  /* 受講履歴テーブル */
  .history-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }

  .history-table th {
    background: var(--paper);
    padding: 8px 12px;
    text-align: left;
    font-size: 11px;
    color: #666;
    border-bottom: 1.5px solid var(--border);
  }

  .history-table td {
    padding: 8px 12px;
    border-bottom: 1px solid #f0ebe0;
  }

  .history-table tr:last-child td { border-bottom: none; }

  /* 有効期限カード */
  .expiry-card {
    background: #fff;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 14px 18px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  .expiry-card.expired { border-color: var(--warn); background: #fff8f8; }
  .expiry-card.warning { border-color: var(--caution); background: #fffcf8; }

  /* ローディング */
  .loading {
    text-align: center;
    padding: 40px;
    color: #999;
    font-size: 14px;
  }

  .loading::after {
    content: '';
    display: inline-block;
    width: 20px;
    height: 20px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-left: 8px;
    vertical-align: middle;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* エラー */
  .error-msg {
    background: #fff0f0;
    border: 1px solid #ffcdd2;
    border-radius: 8px;
    padding: 12px 16px;
    color: var(--warn);
    font-size: 13px;
  }

  /* 統計 */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 12px;
    margin-bottom: 20px;
  }

  .stat-card {
    background: #fff;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    text-align: center;
  }

  .stat-card .num {
    font-size: 28px;
    font-weight: 700;
    color: var(--accent);
    line-height: 1;
    margin-bottom: 4px;
  }

  .stat-card .label {
    font-size: 11px;
    color: #888;
  }

  /* リンクボタン */
  .link-btn {
    display: inline-block;
    padding: 5px 12px;
    background: var(--accent);
    color: #fff;
    border-radius: 6px;
    font-size: 12px;
    text-decoration: none;
    transition: background 0.2s;
  }

  .link-btn:hover { background: #1e4a6e; }

  .close-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 4px 12px;
    font-size: 12px;
    cursor: pointer;
    color: #666;
  }

  /* 設定 */
  .settings-hint {
    background: #f0f7ff;
    border: 1px solid #bbdefb;
    border-radius: 8px;
    padding: 12px 16px;
    font-size: 12px;
    color: #1565c0;
    margin-bottom: 20px;
  }

  @media (max-width: 600px) {
    .search-row { flex-direction: column; }
    .card { grid-template-columns: 1fr; }
    .detail-grid { grid-template-columns: 1fr 1fr; }
    .stats-grid { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>

<header>
  <div style="display:flex;align-items:center;gap:12px">
    <h1>🌿 浄化槽管理士研修会 管理システム</h1>
  </div>
  <div style="display:flex;align-items:center;gap:8px">
    <span id="header-date" style="font-size:11px;opacity:0.8"></span>
    <a href="checkin.html" style="background:rgba(255,255,255,0.2);color:#fff;padding:6px 14px;border-radius:6px;font-size:12px;font-weight:600;text-decoration:none;white-space:nowrap">📋 当日受付</a>
  </div>
</header>

<div class="container">

  <!-- 設定案内 -->
  <div class="settings-hint" id="settings-hint" style="display:none">
    ⚙️ GASのWebアプリURLが設定されていません。<code>config.js</code>の<code>GAS_URL</code>を設定してください。
  </div>

  <!-- タブ -->
  <div class="tabs">
    <button class="tab active" onclick="switchTab('search')">🔍 検索</button>
    <button class="tab" onclick="switchTab('expiry')">⏰ 有効期限</button>
    <button class="tab" onclick="switchTab('stats')">📊 集計</button>
  </div>

  <!-- 検索タブ -->
  <div id="tab-search">
    <div class="search-box">
      <h2>受講者検索</h2>
      <div class="search-row">
        <input type="text" class="search-input" id="search-input"
          placeholder="氏名・フリガナ・管理士番号・採水員ID・事業所名"
          onkeydown="if(event.key==='Enter') doSearch()">
        <button class="btn btn-primary" onclick="doSearch()">検索</button>
        <button class="btn btn-secondary" onclick="clearSearch()">クリア</button>
      </div>
      <div class="search-hint">部分一致で検索できます。例：「鈴木」「10309」「12345」「環境センター」</div>
    </div>

    <!-- 詳細パネル -->
    <div class="detail-panel" id="detail-panel">
      <div class="detail-header">
        <div>
          <div class="detail-kana" id="detail-kana"></div>
          <div class="detail-name" id="detail-name"></div>
        </div>
        <button class="close-btn" onclick="closeDetail()">✕ 閉じる</button>
      </div>
      <div id="detail-body"></div>
    </div>

    <!-- 検索結果 -->
    <div id="search-results"></div>
  </div>

  <!-- 有効期限タブ -->
  <div id="tab-expiry" style="display:none">
    <div class="search-box">
      <h2>⏰ 有効期限アラート</h2>
      <div class="search-row">
        <select class="search-input" id="expiry-months" style="flex:0;width:180px">
          <option value="3">3ヶ月以内</option>
          <option value="6" selected>6ヶ月以内</option>
          <option value="12">1年以内</option>
          <option value="-1">期限切れのみ</option>
        </select>
        <button class="btn btn-warn" onclick="loadExpiry()">確認する</button>
      </div>
    </div>
    <div id="expiry-results"></div>
  </div>

  <!-- 集計タブ -->
  <div id="tab-stats" style="display:none">
    <div id="stats-results">
      <div class="loading">集計データを読み込み中</div>
    </div>
  </div>

</div>

<script>
// ============================================================
// 設定（GASのWebアプリURL）
// ============================================================
const GAS_URL = ''; // ← GASデプロイ後にURLを入れる

// ============================================================
// 初期化
// ============================================================
window.onload = () => {
  const now = new Date();
  document.getElementById('header-date').textContent =
    now.toLocaleDateString('ja-JP', {year:'numeric',month:'long',day:'numeric',weekday:'short'});

  if (!GAS_URL) {
    document.getElementById('settings-hint').style.display = 'block';
  }
};

// ============================================================
// タブ切替
// ============================================================
function switchTab(name) {
  ['search','expiry','stats'].forEach(t => {
    document.getElementById('tab-' + t).style.display = t === name ? 'block' : 'none';
  });
  document.querySelectorAll('.tab').forEach((btn, i) => {
    btn.classList.toggle('active', ['search','expiry','stats'][i] === name);
  });
  if (name === 'stats') loadStats();
}

// ============================================================
// 検索
// ============================================================
function doSearch() {
  const q = document.getElementById('search-input').value.trim();
  if (!q) return;

  const el = document.getElementById('search-results');
  el.innerHTML = '<div class="loading">検索中</div>';
  closeDetail();

  callApi({ action: 'search', q }, data => {
    if (data.status !== 'ok') {
      el.innerHTML = `<div class="error-msg">⚠️ ${data.message}</div>`;
      return;
    }
    if (data.results.length === 0) {
      el.innerHTML = '<div class="error-msg">該当者が見つかりませんでした。</div>';
      return;
    }
    el.innerHTML = `<div class="results-header"><strong>${data.count}</strong> 件見つかりました</div>` +
      data.results.map(r => renderCard(r)).join('');
  });
}

function clearSearch() {
  document.getElementById('search-input').value = '';
  document.getElementById('search-results').innerHTML = '';
  closeDetail();
}

// ============================================================
// カード描画
// ============================================================
function renderCard(r) {
  const badge = expiryBadge(r.expiryStatus, r.expiry);
  return `
  <div class="card" onclick="loadDetail('${r.kanNo}')">
    <div>
      <div class="card-kana">${r.kana || ''}</div>
      <div class="card-name">${r.name}</div>
      <div class="card-info">
        ${r.company || '（所属なし）'}<br>
        管理士番号: ${r.kanNo}　採水員ID: <span class="badge badge-id">${r.newId || '未発番'}</span>
        ${r.lastTraining ? '　最終受講: ' + r.lastTraining : ''}
      </div>
    </div>
    <div class="card-right">
      ${badge}
      <span style="font-size:11px;color:#aaa">受講 ${r.historyCount}回</span>
    </div>
  </div>`;
}

// ============================================================
// 詳細
// ============================================================
function loadDetail(kanNo) {
  const panel = document.getElementById('detail-panel');
  panel.classList.add('show');
  document.getElementById('detail-body').innerHTML = '<div class="loading">読み込み中</div>';
  document.getElementById('detail-name').textContent = '';
  document.getElementById('detail-kana').textContent = '';
  panel.scrollIntoView({ behavior: 'smooth', block: 'start' });

  callApi({ action: 'detail', kanNo }, data => {
    if (data.status !== 'ok') {
      document.getElementById('detail-body').innerHTML = `<div class="error-msg">${data.message}</div>`;
      return;
    }
    const m = data.member;
    document.getElementById('detail-name').textContent = m.name;
    document.getElementById('detail-kana').textContent = m.kana;
    document.getElementById('detail-body').innerHTML = renderDetail(data);
  });
}

function closeDetail() {
  document.getElementById('detail-panel').classList.remove('show');
}

function renderDetail(data) {
  const m = data.member;
  const badge = expiryBadge(m.expiryStatus, m.expiry);

  const ids = [
    m.newId  ? `新採水員ID: <strong>${m.newId}</strong>` : '',
    m.oldId1 ? `旧ID①: ${m.oldId1}` : '',
    m.oldId2 ? `旧ID②: ${m.oldId2}` : '',
    m.oldId3 ? `旧ID③: ${m.oldId3}` : '',
  ].filter(Boolean).join('　');

  const historyRows = data.history.length === 0
    ? '<tr><td colspan="5" style="text-align:center;color:#aaa;padding:16px">受講履歴なし</td></tr>'
    : data.history.map(h => `
      <tr>
        <td>${h.year}</td>
        <td>${h.date}</td>
        <td>${h.venue}</td>
        <td>${h.kubun}</td>
        <td>${h.attend === '欠席' ? '<span style="color:#c62828">欠席</span>' : '出席'}</td>
      </tr>`).join('');

  const certLinks = data.certs.length === 0
    ? '<p style="color:#aaa;font-size:13px">書類リンクなし</p>'
    : data.certs.map(c => `
      <div style="display:flex;gap:12px;align-items:center;margin-bottom:8px;font-size:13px">
        <span>${c.date}</span>
        ${c.certLink   ? `<a class="link-btn" href="${c.certLink}"   target="_blank">委嘱状</a>` : ''}
        ${c.shuryoLink ? `<a class="link-btn" href="${c.shuryoLink}" target="_blank">修了証</a>` : ''}
        ${c.certSent   ? `<span style="color:#888;font-size:11px">送付済: ${c.certSent}</span>` : ''}
      </div>`).join('');

  return `
  <div class="detail-section">
    <h3>基本情報</h3>
    <div class="detail-grid">
      <div class="detail-item"><label>管理士番号</label><span>${m.kanNo}</span></div>
      <div class="detail-item"><label>所属</label><span>${m.company || '―'}</span></div>
      <div class="detail-item"><label>採水員ID</label><span>${ids}</span></div>
      <div class="detail-item"><label>有効期限</label><span>${m.expiry || '―'} ${badge}</span></div>
      ${m.birthday ? `<div class="detail-item"><label>生年月日</label><span>${m.birthday}</span></div>` : ''}
      ${m.tel ? `<div class="detail-item"><label>電話</label><span>${m.tel}</span></div>` : ''}
    </div>
  </div>

  <div class="detail-section">
    <h3>受講履歴（${data.history.length}回）</h3>
    <table class="history-table">
      <thead>
        <tr><th>年度</th><th>開催日</th><th>会場</th><th>区分</th><th>出欠</th></tr>
      </thead>
      <tbody>${historyRows}</tbody>
    </table>
  </div>

  <div class="detail-section">
    <h3>委嘱状・修了証</h3>
    ${certLinks}
  </div>`;
}

// ============================================================
// 有効期限
// ============================================================
function loadExpiry() {
  const months = document.getElementById('expiry-months').value;
  const el = document.getElementById('expiry-results');
  el.innerHTML = '<div class="loading">読み込み中</div>';

  callApi({ action: 'expiring', months }, data => {
    if (data.status !== 'ok') {
      el.innerHTML = `<div class="error-msg">${data.message}</div>`;
      return;
    }
    if (data.results.length === 0) {
      el.innerHTML = '<div class="error-msg">該当者はいません。</div>';
      return;
    }
    el.innerHTML = `<div class="results-header"><strong>${data.count}</strong> 名が対象です</div>` +
      data.results.map(r => `
      <div class="expiry-card ${r.status}">
        <div>
          <div style="font-weight:600;font-size:15px">${r.name}</div>
          <div style="font-size:12px;color:#666">${r.company}　管理士番号: ${r.kanNo}</div>
        </div>
        <div style="text-align:right">
          ${expiryBadge(r.status, r.expiry)}
          <div style="font-size:11px;color:#999;margin-top:4px">
            ${r.diffDays < 0 ? '期限切れ ' + Math.abs(r.diffDays) + '日' : '残り ' + r.diffDays + '日'}
          </div>
        </div>
      </div>`).join('');
  });
}

// ============================================================
// 集計
// ============================================================
function loadStats() {
  const el = document.getElementById('stats-results');
  el.innerHTML = '<div class="loading">集計中</div>';

  callApi({ action: 'stats' }, data => {
    if (data.status !== 'ok') {
      el.innerHTML = `<div class="error-msg">${data.message}</div>`;
      return;
    }
    const s = data.stats;
    const byYearHtml = Object.entries(s.byYear).sort().map(([y,c]) =>
      `<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #f0ebe0;font-size:13px">
        <span>${y}年度</span><strong>${c}名</strong>
      </div>`).join('');

    el.innerHTML = `
    <div class="stats-grid">
      <div class="stat-card"><div class="num">${s.totalMembers}</div><div class="label">総登録者数</div></div>
      <div class="stat-card"><div class="num">${s.withNewId}</div><div class="label">新ID発番済</div></div>
      <div class="stat-card" style="border-color:#ffcdd2">
        <div class="num" style="color:#c62828">${s.expiry.expired}</div>
        <div class="label">期限切れ</div>
      </div>
      <div class="stat-card" style="border-color:#ffe0b2">
        <div class="num" style="color:#e65100">${s.expiry.warning}</div>
        <div class="label">6ヶ月以内</div>
      </div>
      <div class="stat-card" style="border-color:#c8e6c9">
        <div class="num" style="color:#2e7d32">${s.expiry.valid}</div>
        <div class="label">有効</div>
      </div>
    </div>
    <div class="search-box">
      <h2>年度別受講者数</h2>
      ${byYearHtml}
    </div>`;
  });
}

// ============================================================
// 有効期限バッジ
// ============================================================
function expiryBadge(status, expiry) {
  const labels = {
    valid  : '✅ 有効',
    caution: '⚠️ 要注意',
    warning: '🔶 6ヶ月以内',
    expired: '❌ 期限切れ',
  };
  return `<span class="badge badge-${status}">${labels[status] || status}${expiry ? '<br><small>'+expiry+'</small>' : ''}</span>`;
}

// ============================================================
// API呼び出し（JSONP）
// ============================================================
let _cbCount = 0;
function callApi(params, callback) {
  if (!GAS_URL) {
    callback({ status: 'error', message: 'GAS URLが設定されていません。config.jsを確認してください。' });
    return;
  }

  const cbName = '_cb' + (++_cbCount);
  const qs = Object.entries(params).map(([k,v]) => k + '=' + encodeURIComponent(v)).join('&');
  const url = GAS_URL + '?' + qs + '&callback=' + cbName;

  window[cbName] = data => {
    delete window[cbName];
    document.head.removeChild(script);
    callback(data);
  };

  const script = document.createElement('script');
  script.src = url;
  script.onerror = () => {
    delete window[cbName];
    callback({ status: 'error', message: 'APIへの接続に失敗しました。' });
  };
  document.head.appendChild(script);
}
</script>
